<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — LUKIKUTHI</title>

  <!-- =============================================
       IMPORTAÇÕES EXTERNAS
       - Google Fonts: tipografia expressiva
       - GSAP: biblioteca principal de animações
       - GSAP ScrollTrigger: animações com scroll (plugin)
  ============================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    /* =============================================
       VARIÁVEIS GLOBAIS (Design System)
    ============================================= */
    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --accent:    #c8ff57;
      --accent2:   #57c8ff;
      --text:      #f0f0f5;
      --muted:     #5a5a7a;

      --high:      #ff4f4f;
      --med:       #ffb347;
      --low:       #57c8ff;

      --radius:    14px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    /* =============================================
       RESET E BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 100px;
      overflow-x: hidden;
    }

    /* Fundo com grade sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,87,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,87,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* =============================================
       CABEÇALHO
    ============================================= */
    header {
      text-align: center;
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }

    /* Etiqueta pequena acima do título */
    .label {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      display: inline-block;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 16px;
      opacity: 0; /* começa invisível — GSAP anima */
    }

    h1 {
      font-family: var(--font-head);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      opacity: 0; /* GSAP anima */
    }

    /* Parte destacada do título */
    h1 span {
      color: var(--accent);
      display: block;
    }

    /* =============================================
       CONTAINER PRINCIPAL
    ============================================= */
    .app {
      width: 100%;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    /* =============================================
       FORMULÁRIO DE ENTRADA
    ============================================= */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
      opacity: 0; /* GSAP anima */
    }

    /* Linha com input + select + botão */
    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Campo de texto da tarefa */
    #task-input {
      flex: 1 1 200px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      outline: none;
      transition: border-color 0.25s;
    }

    #task-input:focus {
      border-color: var(--accent);
    }

    #task-input::placeholder { color: var(--muted); }

    /* Seletor de prioridade */
    #priority-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.25s;
    }

    #priority-select:focus { border-color: var(--accent); }

    /* Botão de adicionar */
    #add-btn {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      white-space: nowrap;
    }

    #add-btn:hover  { background: #d9ff70; transform: translateY(-2px); }
    #add-btn:active { transform: scale(0.96); }

    /* =============================================
       CONTADORES DE PRIORIDADE
    ============================================= */
    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      opacity: 0; /* GSAP anima */
    }

    /* Cada badge de contagem */
    .stat-badge {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 100px;
    }

    /* Bolinha colorida da prioridade */
    .stat-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-dot.high { background: var(--high); box-shadow: 0 0 8px var(--high); }
    .stat-dot.med  { background: var(--med);  box-shadow: 0 0 8px var(--med);  }
    .stat-dot.low  { background: var(--low);  box-shadow: 0 0 8px var(--low);  }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .stat-count {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      margin-left: auto;
    }

    /* =============================================
       LISTA DE TAREFAS
    ============================================= */
    #task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      list-style: none;
    }

    /* Cada item da lista */
    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      /* Barra lateral colorida por prioridade */
      border-left: 3px solid transparent;
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    /* Cores da barra lateral por prioridade */
    .task-item[data-priority="alta"]  { border-left-color: var(--high); }
    .task-item[data-priority="media"] { border-left-color: var(--med);  }
    .task-item[data-priority="baixa"] { border-left-color: var(--low);  }

    /* Efeito de hover sutil */
    .task-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.015);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .task-item:hover::after { opacity: 1; }

    /* Checkbox personalizado */
    .task-check {
      width: 20px; height: 20px;
      border: 2px solid var(--muted);
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .task-check:hover { border-color: var(--accent); }

    /* Checkmark SVG (oculto por padrão) */
    .task-check svg {
      width: 12px; height: 12px;
      stroke: #0a0a0f;
      stroke-width: 2.5;
      fill: none;
      display: none;
    }

    /* Estado: tarefa concluída */
    .task-item.done .task-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .task-item.done .task-check svg { display: block; }

    /* Texto da tarefa */
    .task-text {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.4;
      transition: color 0.3s;
    }

    /* Texto riscado ao concluir */
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* Badge de prioridade */
    .task-priority {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 100px;
    }

    .task-priority.alta  { background: rgba(255,79,79,0.15);  color: var(--high); }
    .task-priority.media { background: rgba(255,179,71,0.15); color: var(--med);  }
    .task-priority.baixa { background: rgba(87,200,255,0.15); color: var(--low);  }

    /* Botão de remover */
    .task-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      font-size: 18px;
      transition: color 0.2s, background 0.2s;
    }

    .task-remove:hover { color: var(--high); background: rgba(255,79,79,0.1); }

    /* =============================================
       ESTADO VAZIO
    ============================================= */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      display: none; /* exibido via JS */
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
  </style>
</head>

<body>

  <!-- =============================================
       CABEÇALHO DO APP
  ============================================= -->
  <header>
    <div class="label">Desafio IA — Lucas Kikuthi - Vibe Coding</div>
    <h1>Task<span>Flow.</span></h1>
  </header>

  <!-- =============================================
       ÁREA PRINCIPAL DO APP
  ============================================= -->
  <main class="app">

    <!-- Formulário de adição de tarefa -->
    <section class="form-card" aria-label="Adicionar tarefa">
      <div class="form-row">

        <!-- Campo de texto -->
        <input
          type="text"
          id="task-input"
          placeholder="Descreva sua tarefa..."
          aria-label="Descrição da tarefa"
          maxlength="120"
        />

        <!-- Seletor de prioridade -->
        <select id="priority-select" aria-label="Prioridade da tarefa">
          <option value="alta">🔴 Alta</option>
          <option value="media" selected>🟡 Média</option>
          <option value="baixa">🔵 Baixa</option>
        </select>

        <!-- Botão de adicionar -->
        <button id="add-btn" aria-label="Adicionar tarefa">+ Adicionar</button>

      </div>
    </section>

    <!-- Contadores por prioridade -->
    <div class="stats" aria-label="Resumo por prioridade">
      <div class="stat-badge">
        <span class="stat-dot high"></span>
        <span class="stat-label">Alta</span>
        <span class="stat-count" id="count-alta">0</span>
      </div>
      <div class="stat-badge">
        <span class="stat-dot med"></span>
        <span class="stat-label">Média</span>
        <span class="stat-count" id="count-media">0</span>
      </div>
      <div class="stat-badge">
        <span class="stat-dot low"></span>
        <span class="stat-label">Baixa</span>
        <span class="stat-count" id="count-baixa">0</span>
      </div>
    </div>

    <!-- Lista de tarefas -->
    <ul id="task-list" aria-label="Lista de tarefas" aria-live="polite"></ul>

    <!-- Estado vazio -->
    <div class="empty-state" id="empty-state">
      <div class="icon">✦</div>
      <p>Nenhuma tarefa ainda.<br/>Adicione a primeira acima.<p></p>Feito por Lucas Kikuthi - Vibe Code<p>
    </div>

  </main>

  <!-- =============================================
       SCRIPTS: GSAP + LÓGICA DA APLICAÇÃO
  ============================================= -->
  <script>
    // ============================================
    // REGISTRA PLUGIN DO GSAP
    // ============================================
    gsap.registerPlugin(ScrollTrigger);

    // ============================================
    // ANIMAÇÃO DE ENTRADA DA PÁGINA (Timeline GSAP)
    // Cada elemento entra em sequência com stagger
    // ============================================
    const introTl = gsap.timeline({ defaults: { ease: "power3.out" } });

    introTl
      .to(".label",     { opacity: 1, y: 0, duration: 0.6, from: { y: -20 } })
      .from("h1",       { opacity: 0, y: 40, duration: 0.7 }, "-=0.3")
      .to(".form-card", { opacity: 1, y: 0, duration: 0.6, from: { y: 30 } }, "-=0.3")
      .to(".stats",     { opacity: 1, y: 0, duration: 0.5, from: { y: 20 } }, "-=0.2");

    // ============================================
    // REFERÊNCIAS AOS ELEMENTOS DO DOM
    // ============================================
    const taskInput      = document.getElementById("task-input");
    const prioritySelect = document.getElementById("priority-select");
    const addBtn         = document.getElementById("add-btn");
    const taskList       = document.getElementById("task-list");
    const emptyState     = document.getElementById("empty-state");

    // Contadores de cada prioridade
    const counters = {
      alta:  document.getElementById("count-alta"),
      media: document.getElementById("count-media"),
      baixa: document.getElementById("count-baixa"),
    };

    // ============================================
    // ESTADO DA APLICAÇÃO
    // Array que guarda todas as tarefas
    // ============================================
    let tasks = [];

    // ============================================
    // ATUALIZA OS CONTADORES DE PRIORIDADE
    // Animação de "pulso" no número ao mudar
    // ============================================
    function updateCounters() {
      ["alta", "media", "baixa"].forEach(p => {
        const total = tasks.filter(t => t.priority === p).length;
        const el = counters[p];

        // Só anima se o valor mudou
        if (el.textContent !== String(total)) {
          gsap.fromTo(el,
            { scale: 1.4, color: "#c8ff57" },
            { scale: 1,   color: "#f0f0f5", duration: 0.4, ease: "back.out(2)" }
          );
          el.textContent = total;
        }
      });
    }

    // ============================================
    // EXIBE OU ESCONDE O ESTADO VAZIO
    // ============================================
    function toggleEmptyState() {
      if (tasks.length === 0) {
        emptyState.style.display = "block";
        gsap.from(emptyState, { opacity: 0, y: 10, duration: 0.4 });
      } else {
        emptyState.style.display = "none";
      }
    }

    // ============================================
    // CRIA UM ITEM DE TAREFA NO DOM
    // Recebe objeto { id, text, priority, done }
    // ============================================
    function createTaskElement(task) {
      const li = document.createElement("li");
      li.className = "task-item";
      li.dataset.id       = task.id;
      li.dataset.priority = task.priority;

      li.innerHTML = `
        <!-- Checkbox de conclusão -->
        <div class="task-check" role="checkbox" aria-checked="false" tabindex="0" aria-label="Marcar como concluída">
          <svg viewBox="0 0 12 12">
            <polyline points="1.5,6 5,9.5 10.5,2.5" />
          </svg>
        </div>

        <!-- Texto da tarefa -->
        <span class="task-text">${escapeHTML(task.text)}</span>

        <!-- Badge de prioridade -->
        <span class="task-priority ${task.priority}">
          ${task.priority.charAt(0).toUpperCase() + task.priority.slice(1)}
        </span>

        <!-- Botão remover -->
        <button class="task-remove" aria-label="Remover tarefa">×</button>
      `;

      // ---- EVENTO: Marcar como concluída ----
      const check = li.querySelector(".task-check");
      check.addEventListener("click", () => toggleDone(li, task));
      check.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") toggleDone(li, task);
      });

      // ---- EVENTO: Remover tarefa ----
      li.querySelector(".task-remove").addEventListener("click", () => removeTask(li, task.id));

      return li;
    }

    // ============================================
    // ADICIONA NOVA TAREFA
    // Valida input, cria objeto, anima entrada
    // ============================================
    function addTask() {
      const text     = taskInput.value.trim();
      const priority = prioritySelect.value;

      // Validação: campo vazio
      if (!text) {
        gsap.fromTo(taskInput,
          { x: -8 },
          { x: 0, duration: 0.4, ease: "elastic.out(1, 0.3)",
            keyframes: [{ x: -8 }, { x: 8 }, { x: -5 }, { x: 5 }, { x: 0 }] }
        );
        taskInput.focus();
        return;
      }

      // Cria objeto de tarefa
      const task = {
        id:       Date.now(),
        text,
        priority,
        done:     false,
      };

      tasks.push(task);

      const li = createTaskElement(task);
      taskList.prepend(li); // adiciona no topo

      // Animação GSAP de entrada do item
      gsap.from(li, {
        opacity:   0,
        y:        -24,
        scaleX:   0.95,
        duration:  0.5,
        ease:     "back.out(1.7)",
      });

      // Pulso no botão de adicionar
      gsap.fromTo(addBtn,
        { scale: 0.92 },
        { scale: 1, duration: 0.4, ease: "elastic.out(1.5, 0.5)" }
      );

      taskInput.value = "";
      taskInput.focus();
      updateCounters();
      toggleEmptyState();
    }

    // ============================================
    // MARCAR / DESMARCAR TAREFA COMO CONCLUÍDA
    // ============================================
    function toggleDone(li, task) {
      task.done = !task.done;
      li.classList.toggle("done", task.done);

      const check = li.querySelector(".task-check");
      check.setAttribute("aria-checked", task.done);

      if (task.done) {
        // Animação de conclusão: "bounce" no check
        gsap.fromTo(check,
          { scale: 0.6 },
          { scale: 1, duration: 0.5, ease: "elastic.out(1.5, 0.4)" }
        );
        // Texto desliza levemente
        gsap.fromTo(li.querySelector(".task-text"),
          { x: 0 },
          { x: 4, duration: 0.2, yoyo: true, repeat: 1 }
        );
      } else {
        gsap.fromTo(check,
          { scale: 1.2 },
          { scale: 1, duration: 0.3, ease: "power2.out" }
        );
      }
    }

    // ============================================
    // REMOVER TAREFA COM ANIMAÇÃO DE SAÍDA
    // ============================================
    function removeTask(li, id) {
      gsap.to(li, {
        opacity:    0,
        x:         40,
        scaleY:    0.8,
        duration:  0.35,
        ease:      "power2.in",
        onComplete: () => {
          li.remove();
          tasks = tasks.filter(t => t.id !== id);
          updateCounters();
          toggleEmptyState();
        }
      });
    }

    // ============================================
    // SEGURANÇA: Escapa HTML para evitar XSS
    // ============================================
    function escapeHTML(str) {
      return str.replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;",
        '"': "&quot;", "'": "&#39;"
      })[m]);
    }

    // ============================================
    // EVENTOS: Botão e tecla Enter
    // ============================================
    addBtn.addEventListener("click", addTask);
    taskInput.addEventListener("keydown", e => {
      if (e.key === "Enter") addTask();
    });

    // Estado inicial: mostra empty state
    toggleEmptyState();
  </script>

</body>
</html>
